<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Bootstrap | Flexbox</title>
<link rel="stylesheet" href="main.css">    <!-- BOOTSTRAP -->
    <!-- 1. Add bootstrap CSS link to head in index.html -->
  </head>
  <body>
    <div class="box">
      <div class="numbox">
        <div class="display">
          <p id="zero">0</p>
        </div>
        <table>
        <button class="clear">C</button>
        <button class="back">&larr;</button>
        <button class="divide">&#247;</button>
        <button class="seven">7</button>
        <button class="eight">8</button>
        <button class="nine">9</button>
        <button class="multiple">X</button>
        <button class="four">4</button>
        <button class="five">5</button>
        <button class="six">6</button>
        <button class="minus">-</button>
        <button class="one">1</button>
        <button class="two">2</button>
        <button class="three">3</button>
        <button class="plus">+</button>
        <button class="zero">0</button>
        <button class="equal">=</button>
        </table>
      </div>
      
    </div>

    

    <!-- 2. Add bootstrap js link above closing body tag in index.html -->
  </body>
</html>
