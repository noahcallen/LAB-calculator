<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Bootstrap | Flexbox</title>
<link rel="stylesheet" href="main.css">    <!-- BOOTSTRAP -->
    <!-- 1. Add bootstrap CSS link to head in index.html -->
  </head>
  <body>
    <div class="box">
      <div class="numbox">
        <div class="display">
          <p id="zero">0</p>
        </div>
        <table>
        <button class="clear flat-button">C</button>
        <button class="back flat-button">&larr;</button>
        <button class="divide function-button">&#247;</button>
        <button class="seven flat-button">7</button>
        <button class="eight flat-button">8</button>
        <button class="nine flat-button">9</button>
        <button class="multiple function-button">X</button>
        <button class="four flat-button">4</button>
        <button class="five flat-button">5</button>
        <button class="six flat-button">6</button>
        <button class="minus function-button">-</button>
        <button class="one flat-button">1</button>
        <button class="two flat-button">2</button>
        <button class="three flat-button">3</button>
        <button class="plus function-button">+</button>
        <button class="zero flat-button">0</button>
        <button class="equal function-button">=</button>
        </table>
      </div>
    </div>
  </body>
</html>
